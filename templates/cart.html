<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Your Cart</h1>

<table>

<tr>
<th>Item</th>
<th>Price</th>
</tr>

{% for item in cart %}

<tr>
<td>{{ item.item }}</td>
<td>{{ item.price }}</td>
</tr>

{% endfor %}

</table>

<h2>Total: ₹{{ total }}</h2>

<a href="/order"><button>Place Order</button></a>
<a href="/home"><button>Continue Shopping</button></a>

</body>
</html>
